<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internationalex</title>
    <link rel="stylesheet" href="../css/localizationAndLanguages.css">
</head>
<body>
    <div id="processContainer">
        <div class="leftPanel">
            <!-- country management -->
            <div class="countries subsection subLeft">
                <div class="sectionTitle">Country</div>
                <div id="subCountries" class="panel">
                    <select id="countriesDropdown" class="field freezable"></select>
                    <button class="deleteBtn" id="deleteCountryBtn" title="Delete country">✖</button>
                    <button id="addcountryBtn"class="freezable">Add country</button>
                </div>
                <div id="countryDialog" class="panel" style="display: none;">
                    <input type="text" class="field" id="newCountryNameInput" placeholder="Country name">
                    <button id="countryConfirmBtn">Confirm</button>
                </div>
                 <!-- country languages management -->
                <div class="subSectionTitle"> Languages</div>
                <div class="languagesManagement">
                    <div id="languagesContainer">
                    </div>  
                    <div id="addLanguageContainer">
                        <input type="text" id="languageInput" class="freezable" placeholder="Add language">
                        <div id="languageSuggestions"></div>
                    </div>  
                </div>
            </div>

            <!-- city management -->
            <div class="cities subsection subLeft">
                <div class="sectionTitle">City</div>
                <div id="subCities" class="panel">
                    <select id="citiesDropdown" class="field freezable"></select>
                    <button id="deleteCityBtn" title="Delete city">✖</button>
                    <button id="addcityBtn" class="freezable">Add city</button>
                </div>
                <div id="cityDialog" class="panel"style="display: none;">
                    <input type="text" class="field" id="newCityNameInput" placeholder="City name">
                    <button id="cityConfirmBtn">Confirm</button>
                </div> 
            </div>
        </div>
        <div class="rightPanel">
            <div class="subsection">
                <div class="sectionTitle">Venues</div>
                <div class ="removeButtons">
                    <button id="removeVenuesModeButton" style="display: inline;">Enable venues removal</button>
                    <button id="selectAllButton" style="display: none;">Select all</button>
                    <button id="removeVenuesButton" style="display: none;">Remove selected venues</button>
                </div>
    
                <ul class="scrollable-list" id="venuesList" style="display: block;">
                    <li>Élément 1</li>
                    <li>Élément 2</li>
                    <li>Élément 3</li>
                </ul>
            </div>
        </div>
    <!-- div id="message-container"-->
    </div>
   
    <script src="citiesAndCountries.js"></script>
</body>
</html>
